<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>convert-to-md</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --panel2: #243044;
      --text: #e7eef8;
      --muted: #9bb0c9;
      --accent: #5b9dff;
      --accent2: #3dd6c6;
      --danger: #ff6b7a;
      --ok: #5ddea0;
      --border: #334155;
      --shadow: 0 12px 40px rgba(0,0,0,.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(1200px 600px at 10% -10%, #1d3b66 0%, transparent 55%),
        radial-gradient(900px 500px at 100% 0%, #164e4a 0%, transparent 50%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .wrap { max-width: 1040px; margin: 0 auto; padding: 28px 18px 60px; }
    header { display: flex; justify-content: space-between; gap: 16px; align-items: flex-start; margin-bottom: 22px; }
    h1 { margin: 0 0 6px; font-size: 1.55rem; letter-spacing: .2px; }
    .sub { color: var(--muted); font-size: .95rem; line-height: 1.45; }
    .badge {
      background: rgba(91,157,255,.12);
      border: 1px solid rgba(91,157,255,.35);
      color: #b9d5ff;
      padding: 6px 10px;
      border-radius: 999px;
      font-size: .82rem;
      white-space: nowrap;
    }
    .grid { display: grid; grid-template-columns: 1.05fr .95fr; gap: 16px; }
    @media (max-width: 900px) { .grid { grid-template-columns: 1fr; } }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.03), transparent 40%), var(--panel);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .drop {
      border: 1.5px dashed #4b6280;
      border-radius: 14px;
      padding: 28px 16px;
      text-align: center;
      background: rgba(15,20,25,.35);
      transition: .15s ease;
      cursor: pointer;
    }
    .drop.drag { border-color: var(--accent2); background: rgba(61,214,198,.08); }
    .drop strong { display: block; margin-bottom: 6px; }
    .drop span { color: var(--muted); font-size: .9rem; }
    .file-list {
      margin-top: 12px;
      text-align: left;
      max-height: 160px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0c1118;
      padding: 8px 10px;
      font-size: .86rem;
    }
    .file-list:empty::before { content: "未选择文件"; color: var(--muted); }
    .file-list div { padding: 3px 0; color: #cfe0f7; word-break: break-all; }
    .opts { display: grid; gap: 10px; margin-top: 14px; }
    label { display: grid; gap: 4px; font-size: .86rem; color: var(--muted); }
    select, button {
      font: inherit;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: var(--panel2);
      color: var(--text);
      padding: 10px 12px;
    }
    select { width: 100%; }
    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    @media (max-width: 560px) { .row { grid-template-columns: 1fr; } }
    .checks { display: flex; flex-wrap: wrap; gap: 12px 16px; margin-top: 4px; }
    .checks label { display: flex; align-items: center; gap: 8px; color: var(--text); font-size: .9rem; }
    .actions { display: flex; gap: 10px; margin-top: 14px; flex-wrap: wrap; }
    button.primary {
      background: linear-gradient(135deg, #4f8dff, #3ac7b8);
      border: none;
      color: #061018;
      font-weight: 700;
      cursor: pointer;
    }
    button.primary:disabled { opacity: .55; cursor: not-allowed; }
    button.ghost { background: transparent; cursor: pointer; }
    .status { min-height: 1.2em; margin-top: 10px; font-size: .9rem; color: var(--muted); }
    .status.ok { color: var(--ok); }
    .status.err { color: var(--danger); }
    .meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    .chip {
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 10px;
      font-size: .8rem;
      color: var(--muted);
    }
    .batch-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 10px;
      margin-bottom: 8px;
      background: #0c1118;
      font-size: .86rem;
    }
    .batch-item .name { color: #cfe0f7; font-weight: 600; }
    .batch-item .ok { color: var(--ok); }
    .batch-item .fail { color: var(--danger); }
    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #0c1118;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      max-height: 460px;
      overflow: auto;
      font-size: .84rem;
      line-height: 1.45;
      color: #d7e5f8;
    }
    footer { margin-top: 18px; color: var(--muted); font-size: .82rem; }
    code { color: #b7f0e5; }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <div>
        <h1>convert-to-md</h1>
        <div class="sub">本地文件转 Markdown · 支持多文件批量 · 规则优先</div>
      </div>
      <div class="badge" id="ver">loading…</div>
    </header>

    <div class="grid">
      <section class="card">
        <div class="drop" id="drop">
          <strong>拖拽文件到这里，或点击选择</strong>
          <span>支持多文件（最多 30 个，总计约 200MB；单文件约 80MB）</span>
          <div class="file-list" id="flist"></div>
          <input type="file" id="file" multiple hidden />
        </div>

        <div class="opts">
          <div class="row">
            <label>PDF 全文 OCR
              <select id="pdf_ocr">
                <option value="auto" selected>auto</option>
                <option value="off">off</option>
                <option value="force">force</option>
              </select>
            </label>
            <label>PDF 公式图 OCR
              <select id="pdf_formula_ocr">
                <option value="auto" selected>auto</option>
                <option value="off">off</option>
                <option value="force">force</option>
              </select>
            </label>
          </div>
          <div class="row">
            <label>公式 OCR 引擎
              <select id="formula_ocr_engine">
                <option value="auto" selected>auto</option>
                <option value="pix2tex">pix2tex</option>
                <option value="tesseract">tesseract</option>
              </select>
            </label>
            <div class="checks" style="align-content:end; padding-bottom:4px;">
              <label><input type="checkbox" id="pdf_page_headings" /> PDF 页码标题</label>
              <label><input type="checkbox" id="html_keep_infobox" /> 保留 HTML infobox</label>
            </div>
          </div>
        </div>

        <div class="actions">
          <button class="primary" id="btnPreview" disabled>预览首个文件</button>
          <button class="primary" id="btnDownload" disabled>批量转换下载</button>
          <button class="ghost" id="btnClear" type="button">清空</button>
        </div>
        <div class="status" id="status">就绪</div>
      </section>

      <section class="card">
        <div class="meta" id="meta"></div>
        <div id="batch"></div>
        <pre id="preview">转换结果预览会显示在这里。</pre>
      </section>
    </div>

    <footer>
      CLI：<code>convert-to-md file.docx</code> ·
      Web：<code>convert-to-md serve</code> ·
      批量接口：<code>/api/convert-batch</code>
    </footer>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);
    const drop = $("drop");
    const fileInput = $("file");
    const flist = $("flist");
    const statusEl = $("status");
    const preview = $("preview");
    const meta = $("meta");
    const batch = $("batch");
    const btnPreview = $("btnPreview");
    const btnDownload = $("btnDownload");
    let selected = [];

    function setStatus(text, kind="") {
      statusEl.textContent = text;
      statusEl.className = "status" + (kind ? " " + kind : "");
    }

    function renderList() {
      flist.innerHTML = selected.map((f, i) =>
        `<div>${i+1}. ${f.name} <span style="color:#9bb0c9">(${Math.round(f.size/1024)} KB)</span></div>`
      ).join("");
      btnPreview.disabled = selected.length === 0;
      btnDownload.disabled = selected.length === 0;
    }

    function setFiles(fileList) {
      const arr = Array.from(fileList || []);
      // de-dup by name+size
      const map = new Map(selected.map(f => [`${f.name}:${f.size}`, f]));
      for (const f of arr) map.set(`${f.name}:${f.size}`, f);
      selected = Array.from(map.values()).slice(0, 30);
      renderList();
    }

    drop.addEventListener("click", () => fileInput.click());
    fileInput.addEventListener("change", () => setFiles(fileInput.files));
    ["dragenter","dragover"].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.add("drag");
    }));
    ["dragleave","drop"].forEach(ev => drop.addEventListener(ev, e => {
      e.preventDefault(); drop.classList.remove("drag");
    }));
    drop.addEventListener("drop", e => {
      if (e.dataTransfer.files) setFiles(e.dataTransfer.files);
    });

    $("btnClear").addEventListener("click", () => {
      selected = [];
      fileInput.value = "";
      renderList();
      preview.textContent = "转换结果预览会显示在这里。";
      meta.innerHTML = "";
      batch.innerHTML = "";
      setStatus("就绪");
    });

    function appendOptions(fd) {
      fd.append("pdf_ocr", $("pdf_ocr").value);
      fd.append("pdf_formula_ocr", $("pdf_formula_ocr").value);
      fd.append("formula_ocr_engine", $("formula_ocr_engine").value);
      fd.append("pdf_page_headings", $("pdf_page_headings").checked ? "true" : "false");
      fd.append("html_keep_infobox", $("html_keep_infobox").checked ? "true" : "false");
      return fd;
    }

    async function loadHealth() {
      try {
        const r = await fetch("/api/health");
        const j = await r.json();
        $("ver").textContent = `v${j.version} · page OCR: ${(j.page_ocr||[]).join(",")||"none"} · formula: ${(j.formula_ocr||[]).join(",")||"none"}`;
      } catch {
        $("ver").textContent = "offline";
      }
    }

    btnPreview.addEventListener("click", async () => {
      if (!selected.length) return;
      setStatus("预览首个文件…");
      btnPreview.disabled = true; btnDownload.disabled = true;
      try {
        const fd = new FormData();
        fd.append("file", selected[0]);
        appendOptions(fd);
        const r = await fetch("/api/convert-preview", { method: "POST", body: fd });
        const j = await r.json();
        if (!r.ok) throw new Error(typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail || r.statusText));
        meta.innerHTML = [
          `file: ${j.filename}`,
          `kind: ${j.kind}`,
          `lines: ${j.lines}`,
          `chars: ${j.chars}`,
          `assets: ${j.assets}`,
        ].map(t => `<span class="chip">${t}</span>`).join("");
        batch.innerHTML = "";
        preview.textContent = j.preview || "";
        setStatus("预览完成", "ok");
      } catch (e) {
        setStatus(String(e.message || e), "err");
      } finally {
        btnPreview.disabled = !selected.length; btnDownload.disabled = !selected.length;
      }
    });

    btnDownload.addEventListener("click", async () => {
      if (!selected.length) return;
      setStatus(selected.length > 1 ? `批量转换 ${selected.length} 个文件…` : "转换并下载…");
      btnPreview.disabled = true; btnDownload.disabled = true;
      try {
        let r, name;
        if (selected.length === 1) {
          const fd = new FormData();
          fd.append("file", selected[0]);
          appendOptions(fd);
          r = await fetch("/api/convert", { method: "POST", body: fd });
        } else {
          const fd = new FormData();
          for (const f of selected) fd.append("files", f);
          appendOptions(fd);
          r = await fetch("/api/convert-batch", { method: "POST", body: fd });
        }
        if (!r.ok) {
          let detail = r.statusText;
          try {
            const j = await r.json();
            detail = typeof j.detail === "string" ? j.detail : JSON.stringify(j.detail || detail);
          } catch {}
          throw new Error(detail);
        }
        const blob = await r.blob();
        name = r.headers.get("X-Output-Name") || (selected.length > 1 ? "convert_to_md_batch.zip" : (selected[0].name + ".md"));
        const okN = r.headers.get("X-Convert-Ok");
        const failN = r.headers.get("X-Convert-Failed");
        const a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
        meta.innerHTML = [
          `download: ${name}`,
          okN != null ? `ok: ${okN}` : null,
          failN != null ? `failed: ${failN}` : null,
        ].filter(Boolean).map(t => `<span class="chip">${t}</span>`).join("");
        if (selected.length > 1) {
          batch.innerHTML = `<div class="batch-item"><span class="ok">批量完成</span>：已下载 zip（含 SUMMARY.md）</div>`;
          preview.textContent = "批量结果已下载。可打开 zip 中的 SUMMARY.md 查看每个文件状态。";
        }
        setStatus(`下载完成：${name}`, "ok");
      } catch (e) {
        setStatus(String(e.message || e), "err");
      } finally {
        btnPreview.disabled = !selected.length; btnDownload.disabled = !selected.length;
      }
    });

    loadHealth();
  </script>
</body>
</html>
